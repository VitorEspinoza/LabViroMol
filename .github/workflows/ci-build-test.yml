name: CI - Build + Tests

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "infra/**"
  push:
    branches:
      - "feat/**"
      - "fix/**"
      - "refactor/**"
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "infra/**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  ci-required:
    name: CI required (sentinel)
    runs-on: ubuntu-latest
    needs: [build-lint, unit-arch-tests, integration-tests]
    if: always()
    steps:
      - name: Check upstream jobs
        run: |
          for result in "${{ needs.build-lint.result }}" "${{ needs.unit-arch-tests.result }}" "${{ needs.integration-tests.result }}"; do
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "Upstream job failed: $result"
              exit 1
            fi
          done

  build-lint:
    name: Build + format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Restore
        run: dotnet restore LabViroMol.sln

      - name: Build
        run: dotnet build LabViroMol.sln -c Release --no-restore

      - name: Format check
        run: dotnet format LabViroMol.sln --verify-no-changes --no-restore --severity error

  unit-arch-tests:
    name: Unit + architecture tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Restore
        run: dotnet restore LabViroMol.sln

      - name: Build
        run: dotnet build LabViroMol.sln -c Release --no-restore

      - name: Test (unit + architecture)
        shell: bash
        run: |
          set -e
          for proj in \
            tests/UnitTests/Modules/Identity/Domain/LabViroMol.Modules.Identity.Domain.UnitTests.csproj \
            tests/UnitTests/Modules/Inventory/Domain/LabViroMol.Modules.Inventory.Domain.UnitTests.csproj \
            tests/UnitTests/Modules/LabViroMol.Modules.Assets.Domain.UnitTests/LabViroMol.Modules.Assets.Domain.UnitTests.csproj \
            tests/UnitTests/Modules/Research/Domain/LabViroMol.Modules.Research.Domain.UnitTests.csproj \
            tests/UnitTests/Modules/Scheduling/LabViroMol.Modules.Scheduling.Domain.UnitTests.csproj \
            tests/UnitTests/Modules/Shared/LabViroMol.Modules.Shared.Infrastructure.UnitTests.csproj \
            tests/ArchitectureTests/LabViroMol.ArchitectureTests/LabViroMol.ArchitectureTests.csproj \
          ; do
            dotnet test "$proj" -c Release --no-build --logger "trx" --results-directory TestResults/unit-arch --collect:"XPlat Code Coverage"
          done

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit-arch
          path: TestResults/unit-arch
          retention-days: 14

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Restore
        run: dotnet restore LabViroMol.sln

      - name: Build
        run: dotnet build LabViroMol.sln -c Release --no-restore

      - name: Test (integration, Testcontainers)
        run: |
          for proj in $(find tests/IntegrationTests -name "*.csproj" | grep -v "Shared"); do
            dotnet test "$proj" -c Release --no-build \
              --logger "trx" \
              --results-directory TestResults/integration \
              --collect:"XPlat Code Coverage"
          done

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: TestResults/integration
          retention-days: 14
