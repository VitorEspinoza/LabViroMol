name: Secrets scanning

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "infra/**"
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "infra/**"
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch: {}

concurrency:
  group: secrets-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    env:
      GITLEAKS_LOG_OPTS: ${{ github.event_name == 'pull_request' && format('--no-merges {0}..{1}', github.event.pull_request.base.sha, github.event.pull_request.head.sha) || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true
          GITLEAKS_REPORT_FORMAT: sarif
          GITLEAKS_REPORT_PATH: gitleaks-results.sarif
          GITLEAKS_REDACT: true

      - name: Upload SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks-results.sarif
          category: gitleaks
