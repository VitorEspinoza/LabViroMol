name: CD

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "infra/**"

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/vitorespinoza/labviromol-api
  IMAGE_MIGRATE: ghcr.io/vitorespinoza/labviromol-migrate

jobs:
  container-scan-gate:
    name: Container scan (gate)
    # O workflow reutilizável pede security-events: write internamente; numa chamada via
    # workflow_call o chamador precisa conceder pelo menos isso, senão o run falha no startup.
    permissions:
      contents: read
      security-events: write
    uses: ./.github/workflows/container-scan.yml

  build-push:
    name: Build + push (API + migrate)
    runs-on: ubuntu-latest
    needs: [container-scan-gate]
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      api-digest: ${{ steps.push-api.outputs.digest }}
      migrate-digest: ${{ steps.push-migrate.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push API image
        id: push-api
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_API }}:latest
            ${{ env.IMAGE_API }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: SBOM (Syft) — API image
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_API }}@${{ steps.push-api.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom-api.cdx.json
          upload-artifact: false

      - name: Attest SBOM — API image
        uses: actions/attest-sbom@v2
        with:
          subject-name: ${{ env.IMAGE_API }}
          subject-digest: ${{ steps.push-api.outputs.digest }}
          sbom-path: sbom-api.cdx.json
          push-to-registry: true

      - name: SLSA provenance attestation — API image
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.IMAGE_API }}
          subject-digest: ${{ steps.push-api.outputs.digest }}
          push-to-registry: true

      - name: Build + push migrate image
        id: push-migrate
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.migrate
          push: true
          tags: |
            ${{ env.IMAGE_MIGRATE }}:latest
            ${{ env.IMAGE_MIGRATE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: SBOM (Syft) — migrate image
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_MIGRATE }}@${{ steps.push-migrate.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom-migrate.cdx.json
          upload-artifact: false

      - name: Attest SBOM — migrate image
        uses: actions/attest-sbom@v2
        with:
          subject-name: ${{ env.IMAGE_MIGRATE }}
          subject-digest: ${{ steps.push-migrate.outputs.digest }}
          sbom-path: sbom-migrate.cdx.json
          push-to-registry: true

      - name: SLSA provenance attestation — migrate image
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.IMAGE_MIGRATE }}
          subject-digest: ${{ steps.push-migrate.outputs.digest }}
          push-to-registry: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign API image (cosign keyless)
        run: cosign sign --yes "${IMAGE_API}@${DIGEST}"
        env:
          IMAGE_API: ${{ env.IMAGE_API }}
          DIGEST: ${{ steps.push-api.outputs.digest }}
          COSIGN_EXPERIMENTAL: "1"

      - name: Sign migrate image (cosign keyless)
        run: cosign sign --yes "${IMAGE_MIGRATE}@${DIGEST}"
        env:
          IMAGE_MIGRATE: ${{ env.IMAGE_MIGRATE }}
          DIGEST: ${{ steps.push-migrate.outputs.digest }}
          COSIGN_EXPERIMENTAL: "1"

      - name: Summary — digests publicados
        run: |
          {
            echo "### Imagens publicadas"
            echo "- API: \`${IMAGE_API}@${API_DIGEST}\`"
            echo "- migrate: \`${IMAGE_MIGRATE}@${MIGRATE_DIGEST}\`"
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          IMAGE_API: ${{ env.IMAGE_API }}
          API_DIGEST: ${{ steps.push-api.outputs.digest }}
          IMAGE_MIGRATE: ${{ env.IMAGE_MIGRATE }}
          MIGRATE_DIGEST: ${{ steps.push-migrate.outputs.digest }}

  deploy:
    name: Deploy (migrate-first, minimal-downtime)
    runs-on: ubuntu-latest
    needs: [build-push]

    environment: production

    permissions:
      contents: read
      deployments: write

    env:
      REMOTE_DIR: labviromol-deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Sync config files to droplet
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            mkdir -p "$HOME/${{ env.REMOTE_DIR }}/nginx"
            mkdir -p "$HOME/${{ env.REMOTE_DIR }}/certbot"
            mkdir -p "$HOME/${{ env.REMOTE_DIR }}/secrets"

      - name: Upload docker-compose.prod.yaml
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "docker-compose.prod.yaml"
          target: "${{ env.REMOTE_DIR }}"

      - name: Upload nginx/gateway.conf
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "nginx/gateway.conf"
          target: "${{ env.REMOTE_DIR }}/nginx"
          strip_components: 1

      - name: Upload secrets/prod.enc.env
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "secrets/prod.enc.env"
          target: "${{ env.REMOTE_DIR }}/secrets"
          strip_components: 1

      - name: Decrypt secrets + migrate-first gate
        id: migrate
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -euo pipefail
            cd "$HOME/${{ env.REMOTE_DIR }}"

            echo "==> Decriptando secrets (SOPS/age)..."
            sops --decrypt secrets/prod.enc.env > .env
            chmod 600 .env

            echo "==> Autenticando no GHCR..."
            echo "${{ secrets.GHCR_PAT }}" | \
              docker login ghcr.io -u "${{ secrets.DROPLET_USER }}" --password-stdin

            echo "==> Pull da imagem migrate (tag: ${{ github.sha }})..."
            API_TAG="${{ github.sha }}" \
              docker compose -f docker-compose.prod.yaml \
                --env-file .env \
                pull migrate

            echo "==> Executando migração (gate de exit code)..."
            set +e
            API_TAG="${{ github.sha }}" \
              docker compose -f docker-compose.prod.yaml \
                --env-file .env \
                run --rm migrate
            MIGRATE_EXIT=$?
            set -e

            echo "MIGRATE_EXIT=${MIGRATE_EXIT}" > /tmp/migrate_result
            echo "==> Migração finalizada com exit code: ${MIGRATE_EXIT}"
            exit "${MIGRATE_EXIT}"

      - name: Pull + deploy API (minimal-downtime)
        if: steps.migrate.outcome == 'success'
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -euo pipefail
            cd "$HOME/${{ env.REMOTE_DIR }}"

            echo "==> Pull da imagem API (tag: ${{ github.sha }})..."
            API_TAG="${{ github.sha }}" \
              docker compose -f docker-compose.prod.yaml \
                --env-file .env \
                pull api

            echo "==> Subindo API nova (restart rápido, ~2-5s de janela)..."
            API_TAG="${{ github.sha }}" \
              docker compose -f docker-compose.prod.yaml \
                --env-file .env \
                up -d api

            echo "==> API nova subiu — aguardando healthcheck /health/ready..."

      - name: Validate /health/ready post-deploy
        id: health
        if: steps.migrate.outcome == 'success'
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -euo pipefail

            MAX_RETRIES=18
            INTERVAL=10
            URL="http://localhost:8080/health/ready"
            echo "==> Verificando ${URL} (até ${MAX_RETRIES} tentativas, intervalo ${INTERVAL}s)..."

            for i in $(seq 1 "${MAX_RETRIES}"); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "${URL}" 2>/dev/null || true)
              if [ "${STATUS}" = "200" ]; then
                echo "==> /health/ready retornou 200 na tentativa ${i}. Deploy OK."
                exit 0
              fi
              echo "    Tentativa ${i}/${MAX_RETRIES}: status=${STATUS} — aguardando ${INTERVAL}s..."
              sleep "${INTERVAL}"
            done

            echo "ERRO: /health/ready nao retornou 200 após ${MAX_RETRIES} tentativas." >&2
            echo "POLITICA FIX-FORWARD: nao ha rollback automatico." >&2
            echo "Se houve migracao nova neste deploy: corrija e re-deploje (fix-forward)." >&2
            echo "Se este deploy nao trouxe migracao nova: rollback manual de imagem e seguro" >&2
            echo "  (ver docs/runbooks/deploy.md para o procedimento)." >&2
            exit 1

      - name: New Relic deployment marker
        id: nr-marker
        if: steps.migrate.outcome == 'success' && steps.health.outcome == 'success'
        env:
          NR_USER_API_KEY: ${{ secrets.NR_USER_API_KEY }}
          NR_ENTITY_GUID: ${{ secrets.NEW_RELIC_ENTITY_GUID }}
        run: |
          if [[ -z "${NR_USER_API_KEY}" || -z "${NR_ENTITY_GUID}" ]]; then
            echo "::warning::NEW_RELIC_ENTITY_GUID ou NR_USER_API_KEY não configurados." \
              "Deployment marker não registrado no New Relic."
            echo "marker_skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          DEEP_LINK="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          MUTATION_PAYLOAD=$(jq -n \
            --arg guid    "${NR_ENTITY_GUID}" \
            --arg version "${{ github.sha }}" \
            --arg user    "${{ github.actor }}" \
            --arg link    "${DEEP_LINK}" \
            '{
              query: "mutation($deployment: ChangeTrackingDeploymentInput!) { changeTrackingCreateDeployment(deployment: $deployment) { entityGuid deploymentId } }",
              variables: {
                deployment: {
                  entityGuid: $guid,
                  version: $version,
                  user: $user,
                  deepLink: $link,
                  deploymentType: "BASIC"
                }
              }
            }')

          HTTP_RESPONSE=$(curl -s -w "\n__HTTP_STATUS__%{http_code}" \
            -X POST "https://api.newrelic.com/graphql" \
            -H "Content-Type: application/json" \
            -H "API-Key: ${NR_USER_API_KEY}" \
            -d "$MUTATION_PAYLOAD")

          HTTP_STATUS=$(echo "$HTTP_RESPONSE" | tail -n1 | sed 's/__HTTP_STATUS__//')
          HTTP_BODY=$(echo "$HTTP_RESPONSE" | sed '$d')

          if [[ "$HTTP_STATUS" != "200" ]]; then
            echo "::warning::New Relic deployment marker falhou (HTTP ${HTTP_STATUS})."
            echo "$HTTP_BODY"
            echo "marker_skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          GQL_ERRORS=$(echo "$HTTP_BODY" | jq -r '.errors // empty')
          if [[ -n "$GQL_ERRORS" ]]; then
            echo "::warning::New Relic deployment marker retornou erros GraphQL:"
            echo "$GQL_ERRORS"
            echo "marker_skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          DEPLOYMENT_ID=$(echo "$HTTP_BODY" | \
            jq -r '.data.changeTrackingCreateDeployment.deploymentId // "unknown"')
          echo "==> Deployment marker registrado no New Relic. ID: ${DEPLOYMENT_ID}"
          echo "marker_skipped=false" >> "$GITHUB_OUTPUT"

      - name: Release gate (NRQL)
        id: nr-gate
        if: steps.migrate.outcome == 'success' && steps.health.outcome == 'success'
        env:
          NR_USER_API_KEY: ${{ secrets.NR_USER_API_KEY }}
          NR_ACCOUNT_ID: ${{ secrets.NEW_RELIC_ACCOUNT_ID }}
          NR_APP_NAME: labviromol-api
          WINDOW_MINUTES: "5"
          ERR_PCT_THRESHOLD: "2"
          P95_THRESHOLD_MS: "2000"
        run: |
          if [[ -z "${NR_USER_API_KEY}" || -z "${NR_ACCOUNT_ID}" ]]; then
            echo "::warning::NR_USER_API_KEY ou NEW_RELIC_ACCOUNT_ID não configurados." \
              "Release gate pulado — configure os secrets para habilitar."
            exit 0
          fi

          echo "==> Aguardando 3 minutos para acumular dados pós-deploy..."
          sleep 180

          bash scripts/deploy/nr-release-gate.sh

      - name: Alert on migration failure
        if: steps.migrate.outcome == 'failure'
        run: |
          echo "::error title=Migration failed::A migracao falhou (exit != 0)." \
            "A API nova NAO foi subida; a versao anterior continua servindo." \
            "Verifique os logs do container migrate na droplet." \
            "Nao ha rollback automatico."
          exit 1

      - name: Register GitHub Deployment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const outcome = '${{ steps.migrate.outcome }}';
            const healthOk = '${{ job.status }}' === 'success';
            const state = healthOk ? 'success' : 'failure';
            const description = healthOk
              ? 'Deploy concluído — /health/ready 200'
              : (outcome === 'failure'
                  ? 'Falha na migração — API anterior mantida (fix-forward)'
                  : 'Falha no healthcheck pós-deploy — fix-forward recomendado');

            const deploy = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              auto_merge: false,
              required_contexts: [],
              description: description,
            });

            if (deploy.data.id) {
              await github.rest.repos.createDeploymentStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: deploy.data.id,
                state: state,
                description: description,
                environment_url: process.env.FRONTEND_URL || '',
                log_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              });
            }

      - name: Deploy summary
        if: always()
        run: |
          {
            echo "### Deploy — ${{ job.status }}"
            echo "- **SHA:** \`${{ github.sha }}\`"
            echo "- **Migração:** ${{ steps.migrate.outcome }}"
            echo "- **Health check:** ${{ steps.health.outcome }}"
            echo "- **NR deployment marker:** ${{ steps.nr-marker.outcome }}"
            echo "- **Release gate (NRQL):** ${{ steps.nr-gate.outcome }}"
            echo "- **Política:** fix-forward (sem rollback automático de imagem)"
            echo ""
            echo "> Serviços não tocados neste deploy: \`postgres\`, \`libretranslate\`,"
            echo "> \`gateway\`, \`certbot\`, \`admin\`, \`institucional\`."
            echo "> Thresholds do gate: errPct <= 2% | p95 <= 2000ms | janela 5 min."
            echo "> Ver docs/runbooks/release-gate.md para procedimento de resposta."
          } >> "$GITHUB_STEP_SUMMARY"
