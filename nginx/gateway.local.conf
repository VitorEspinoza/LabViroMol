server {
    listen 80;
    server_name localhost lab.vitorespinoza.com;

    resolver 127.0.0.11 valid=30s ipv6=off;

    set $api_upstream api:8080;
    set $admin_upstream admin:80;
    set $institucional_upstream institucional:3000;

    client_max_body_size 20m;

    location /api/ {
        rewrite ^/api/(.*)$ /api/$1 break;
        proxy_pass http://$api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /images/ {
        rewrite ^/images/(.*)$ /images/$1 break;
        proxy_pass http://$api_upstream;
        proxy_set_header Host $host;
    }

    location = /gestao-lab-ufpr {
        return 301 /gestao-lab-ufpr/;
    }

    location /gestao-lab-ufpr/ {
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        rewrite ^/gestao-lab-ufpr/(.*)$ /$1 break;
        proxy_pass http://$admin_upstream;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://$institucional_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
