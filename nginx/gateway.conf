server {
    listen 80;
    server_name lab.vitorespinoza.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name lab.vitorespinoza.com;

    ssl_certificate     /etc/letsencrypt/live/lab.vitorespinoza.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lab.vitorespinoza.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 20m;

    resolver 127.0.0.11 valid=10s;

    location /api/ {
        set $api_upstream api:8080;
        proxy_pass http://$api_upstream/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /images/ {
        set $api_upstream api:8080;
        proxy_pass http://$api_upstream/images/;
        proxy_set_header Host $host;
    }

    location = /gestao-lab-ufpr {
        return 301 /gestao-lab-ufpr/;
    }

    location /gestao-lab-ufpr/ {
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        set $admin_upstream admin:80;
        proxy_pass http://$admin_upstream/;
        proxy_set_header Host $host;
    }

    location / {
        set $institucional_upstream institucional:3000;
        proxy_pass http://$institucional_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
