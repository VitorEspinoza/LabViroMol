services:
  postgres:
    image: postgres:17
    container_name: labviromol-postgres
    restart: unless-stopped
    command:
      - postgres
      - -c
      - shared_buffers=128MB
      - -c
      - effective_cache_size=384MB
      - -c
      - maintenance_work_mem=32MB
      - -c
      - work_mem=4MB
      - -c
      - max_connections=50
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-labviromol}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-labviromol_dev}
      POSTGRES_DB: ${POSTGRES_DB:-LabViroMol}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-labviromol} -d ${POSTGRES_DB:-LabViroMol}"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  libretranslate:
    image: libretranslate/libretranslate:v1.9.6
    container_name: libretranslate
    restart: unless-stopped
    environment:
      LT_LOAD_ONLY: pt,en
      LT_THREADS: 1
    volumes:
      - libretranslate_data:/home/libretranslate/.local
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:5000/languages', timeout=3).status == 200 else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1024M

  api:
    image: ghcr.io/vitorespinoza/labviromol-api:${API_TAG:-latest}
    container_name: labviromol-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      DOTNET_gcServer: "0"
      ConnectionStrings__LabViroMol: ${DB_CONNECTION_STRING}
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER:-LabViroMol}
      Jwt__Audience: ${JWT_AUDIENCE:-LabViroMol}
      Email__Host: ${EMAIL_HOST}
      Email__Port: ${EMAIL_PORT:-587}
      Email__Username: ${EMAIL_USERNAME}
      Email__Password: ${EMAIL_PASSWORD}
      Email__SenderName: ${EMAIL_SENDER_NAME}
      Email__SenderEmail: ${EMAIL_SENDER_EMAIL}
      Frontend__BaseUrl: ${FRONTEND_BASE_URL}
      Cors__AllowedOrigins__0: ${CORS_ORIGIN_INSTITUCIONAL:-http://localhost:3000}
      Cors__AllowedOrigins__1: ${CORS_ORIGIN_ADMIN:-http://localhost:4200}
      Storage__RootFolder: /app/Upload/Images
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
      OTEL_EXPORTER_OTLP_HEADERS: api-key=${NR_LICENSE_KEY}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      OTEL_EXPORTER_OTLP_COMPRESSION: ${OTEL_EXPORTER_OTLP_COMPRESSION:-gzip}
      OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE: ${OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE:-delta}
    volumes:
      - uploads_images:/app/Upload/Images
    healthcheck:
      test:
        - "CMD-SHELL"
        - >-
          bash -c "
            exec 3<>/dev/tcp/127.0.0.1/8080 &&
            printf 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 &&
            head -n 1 <&3 | grep -q ' 200 '
          "
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M

  migrate:
    image: ghcr.io/vitorespinoza/labviromol-migrate:${API_TAG:-latest}
    container_name: labviromol-migrate
    restart: "no"
    profiles:
      - migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_CONNECTION_STRING: ${DB_CONNECTION_STRING}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  admin:
    image: ghcr.io/vitorespinoza/labviromol-admin:${ADMIN_TAG:-latest}
    restart: unless-stopped
    depends_on:
      - api
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:80/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M

  institucional:
    image: ghcr.io/vitorespinoza/labviromol-institucional:${INST_TAG:-latest}
    container_name: labviromol-institucional
    restart: unless-stopped
    environment:
      API_URL: http://api:8080/api/
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_OPTIONS: "--max-old-space-size=384"
    depends_on:
      - api
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:3000/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  gateway:
    image: nginx:alpine
    container_name: labviromol-gateway
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/gateway.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - api
      - admin
      - institucional
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:80/ >/dev/null 2>&1; test $$? -ne 7"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 64M

  certbot:
    image: certbot/dns-cloudflare:latest
    container_name: labviromol-certbot
    restart: unless-stopped
    volumes:
      - certbot_certs:/etc/letsencrypt
      - ./certbot/cloudflare.ini:/etc/cloudflare.ini:ro
    entrypoint: >
      sh -c "trap exit TERM;
      while :; do
        certbot renew --dns-cloudflare --dns-cloudflare-credentials /etc/cloudflare.ini --quiet;
        sleep 12h & wait $${!};
      done"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'certbot renew' >/dev/null || pgrep sh >/dev/null"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 256M

volumes:
  postgres_data:
  uploads_images:
  libretranslate_data:
  certbot_certs:
