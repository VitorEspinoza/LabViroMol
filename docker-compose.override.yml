services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate

  admin:
    build:
      context: ../LabViroMol-Admin-Panel
      dockerfile: Dockerfile

  institucional:
    build:
      context: ../labviromol-institucional
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_STORAGE_URL: http://api:8080

  gateway:
    ports: !override
      - "80:80"
    volumes:
      - ./nginx/gateway.local.conf:/etc/nginx/conf.d/default.conf:ro
